version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackie-networks-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      - NODE_ENV=production
    labels:
      # Coolify labels (if using Coolify)
      - "coolify.managed=true"
      - "coolify.name=blackie-networks-frontend"
      - "coolify.http.port=80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
